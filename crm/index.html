<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>CRM Networking Personal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- CSP estricta sin inline scripts -->
  <meta http-equiv="Content-Security-Policy"
        content="
          default-src 'self';
          script-src 'self' https://accounts.google.com https://apis.google.com;
          style-src 'self' 'unsafe-inline';
          img-src 'self' data:;
          connect-src 'self' https://www.googleapis.com;
          frame-src https://accounts.google.com;
          object-src 'none';
        ">

  <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Google API client -->
  <script src="https://apis.google.com/js/api.js" async defer></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }
    header {
      background: #111827;
      color: white;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 1.1rem;
    }
    main {
      padding: 1rem 1.5rem;
      max-width: 1000px;
      margin: 0 auto;
    }
    .btn {
      padding: 0.4rem 0.8rem;
      border-radius: 0.375rem;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .btn-primary {
      background: #2563eb;
      color: white;
    }
    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .btn-danger {
      background: #dc2626;
      color: white;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .card {
      background: white;
      border-radius: 0.5rem;
      padding: 1rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      margin-bottom: 1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: 2fr 3fr;
      gap: 1rem;
    }
    .field {
      margin-bottom: 0.5rem;
    }
    .field label {
      display: block;
      font-size: 0.8rem;
      color: #4b5563;
      margin-bottom: 0.15rem;
    }
    .field input,
    .field textarea,
    .field select {
      width: 100%;
      padding: 0.35rem 0.45rem;
      border-radius: 0.375rem;
      border: 1px solid #d1d5db;
      font-size: 0.9rem;
      box-sizing: border-box;
    }
    input[type="checkbox"] {
      width: auto !important;
      margin-left: 0;
    }
    .field textarea {
      min-height: 80px;
      resize: vertical;
    }
    .contacts-list {
      max-height: 70vh;
      overflow-y: auto;
    }
    .contact-item {
      padding: 0.5rem 0.4rem;
      border-bottom: 1px solid #e5e7eb;
      cursor: pointer;
    }
    .contact-item:hover {
      background: #f3f4f6;
    }
    .contact-item.active {
      background: #dbeafe;
    }
    .contact-item.ignored {
      opacity: 0.5;
      border-left: 4px solid #9ca3af;
    }
    .contact-title {
      font-weight: 600;
      font-size: 0.9rem;
    }
    .contact-sub {
      font-size: 0.8rem;
      color: #6b7280;
    }
    .tags {
      font-size: 0.75rem;
      color: #4b5563;
    }
    .pill {
      display: inline-block;
      background: #e5e7eb;
      border-radius: 999px;
      padding: 0.1rem 0.5rem;
      margin-right: 0.25rem;
      margin-top: 0.15rem;
    }
    .top-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .top-row input {
      flex: 1;
    }
    .muted {
      font-size: 0.8rem;
      color: #6b7280;
    }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.1rem 0.4rem;
      border-radius: 999px;
      background: #fee2e2;
      color: #b91c1c;
      margin-left: 0.25rem;
    }
    .contact-item.red {
      border-left: 4px solid #dc2626;
    }
    .contact-item.yellow {
      border-left: 4px solid #facc15;
    }
    .contact-item.green {
      border-left: 4px solid #16a34a;
    }
    #history-list {
      max-height: 120px;
      overflow-y: auto;
      font-size: 0.8rem;
      border: 1px solid #e5e7eb;
      border-radius: 0.375rem;
      padding: 0.4rem;
      margin-top: 0.3rem;
      background: #f9fafb;
    }
  </style>
</head>

<body>
<header>
  <h1>CRM de Networking Personal</h1>
  <div>
    <span id="user-email" class="muted"></span>
    <button id="login-btn" class="btn btn-primary">Iniciar sesión con Google</button>
    <button id="logout-btn" class="btn btn-secondary" style="display:none;">Salir</button>
  </div>
</header>

<main>
  <div id="status" class="muted" style="margin-bottom:0.5rem;">No autenticado.</div>

  <div class="card">
    <div class="top-row">
      <input id="search" type="text" placeholder="Buscar por nombre, empresa o tags..." />
      <select id="urgency-filter">
        <option value="">Todos</option>
        <option value="red">Vencidos</option>
        <option value="yellow">Próxima semana</option>
        <option value="green">Sin urgencia</option>
      </select>
      <button id="new-contact-btn" class="btn btn-secondary">Nuevo contacto</button>
      <button id="save-btn" class="btn btn-primary" disabled>Guardar cambios</button>
    </div>
    <div class="muted" id="summary"></div>
  </div>

  <div class="grid">
    <div class="card">
      <h3 style="margin-top:0;">Contactos</h3>
      <div class="contacts-list" id="contacts-list"></div>
    </div>

    <div class="card">
      <h3 style="margin-top:0;">Detalle</h3>
      <div id="detail-empty" class="muted">Selecciona un contacto o crea uno nuevo.</div>
      <div id="detail-form" style="display:none;">

        <div class="field">
          <label>Nombre</label>
          <input id="f-name" type="text" />
        </div>

        <div class="field">
          <label>Empresa</label>
          <input id="f-company" type="text" />
        </div>

        <div class="field">
          <label>Cargo / Rol</label>
          <input id="f-role" type="text" />
        </div>

        <div class="field">
          <label>Email</label>
          <input id="f-email" type="email" />
        </div>

        <div class="field">
          <label>Teléfono</label>
          <input id="f-phone" type="text" />
        </div>

        <div class="field">
          <label>Tags (separados por comas)</label>
          <input id="f-tags" type="text" placeholder="IA, Startups, Inversores..." />
        </div>

        <div class="field">
          <label>Notas</label>
          <textarea id="f-notes"></textarea>
        </div>

        <div class="field">
          <label>Último contacto</label>
          <input id="f-last" type="date" />
        </div>

        <div class="field">
          <label>Próximo seguimiento</label>
          <input id="f-next" type="date" />
        </div>

        <div class="field">
          <label>Ignorar este contacto (no hacer seguimiento)</label>
          <input type="checkbox" id="f-ignore" />
        </div>

        <div class="field">
          <label>Historial de interacciones</label>
          <textarea id="f-history" placeholder="Añade notas de interacción..."></textarea>
          <button id="add-history-btn" class="btn btn-secondary" type="button">Añadir al historial</button>
          <div id="history-list" class="muted"></div>
        </div>

        <div class="field">
          <button id="delete-btn" class="btn btn-danger">Eliminar contacto</button>
        </div>

      </div>
    </div>
  </div>
</main>

<!-- Tu lógica en JS externo -->
<script src="app.js"></script>
</body>
</html>
